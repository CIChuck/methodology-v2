name: methodology

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  shell-and-unit:
    name: shell-and-unit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Print versions
        shell: bash
        run: |
          /bin/bash --version | head -n 1
          git --version
          python3 --version
          ./scripts/test-methodology.sh --platform-summary --list

      - name: Syntax-check discovered shell surfaces
        shell: bash
        run: ./scripts/test-methodology.sh --suite shell-syntax

      - name: Run parser, checker, lifecycle, and metrics units
        shell: bash
        run: |
          ./scripts/test-methodology.sh --suite checker
          ./scripts/test-methodology.sh --suite lifecycle
          ./scripts/test-methodology.sh --suite metrics

  runtime-integration:
    name: runtime-integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run lifecycle runtime integration
        shell: bash
        run: ./scripts/test-methodology.sh --suite runtime-tools

      - name: Run staged guard and hook integration
        shell: bash
        run: ./scripts/test-methodology.sh --suite enforcement-tools

  distribution-integration:
    name: distribution-integration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run install and backfill integration
        shell: bash
        run: ./scripts/test-methodology.sh --suite distribution-tools

  event-and-range-guard:
    name: event-and-range-guard (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run guard/range suite
        shell: bash
        run: ./scripts/test-methodology.sh --suite enforcement-tools

      - name: Run actual repository range guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
            head_ref="${{ github.sha }}"
          else
            base_ref="${{ github.event.before }}"
            head_ref="${{ github.sha }}"
            if printf '%s\n' "$base_ref" | grep -Eq '^0+$'; then
              base_ref="$(git rev-list --max-parents=0 "$head_ref" | tail -n 1)"
            fi
          fi

          if ! git cat-file -e "$base_ref^{commit}"; then
            printf 'ERROR: base ref missing: %s\n' "$base_ref" >&2
            exit 1
          fi
          if ! git cat-file -e "$head_ref^{commit}"; then
            printf 'ERROR: head ref missing: %s\n' "$head_ref" >&2
            exit 1
          fi

          scripts/methodology-guard.sh --range "$base_ref" "$head_ref"

  examples:
    name: examples (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run current examples
        shell: bash
        run: ./scripts/test-methodology.sh --suite examples

  migration:
    name: migration (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run migration fixtures
        shell: bash
        run: ./scripts/test-methodology.sh --suite migration

  release-coherence:
    name: release-coherence (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install prerequisites (ripgrep)
        shell: bash
        run: |
          if command -v rg >/dev/null 2>&1; then
            rg --version | head -n 1
          elif command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y -q ripgrep
          elif command -v brew >/dev/null 2>&1; then
            brew install ripgrep
          else
            printf 'ERROR: no supported package manager to install ripgrep\n' >&2
            exit 1
          fi
          rg --version | head -n 1

      - name: Run release coherence checks
        shell: bash
        run: ./scripts/test-methodology.sh --suite release-coherence

      - name: Run repository methodology checker
        shell: bash
        run: ./scripts/check-methodology.sh

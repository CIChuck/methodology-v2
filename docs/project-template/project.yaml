project:
  name: "[Project Name]"
  slug: "[project-slug]"
  status: initialized
  current_gate: G1
  methodology_version: 0.5.0-operational-coherence
  methodology_release_stage: pre-1.0
  initialized_on: "[YYYY-MM-DD]"

human_control:
  owner: TBD
  approver: TBD
  deployment_approver: TBD

authority:
  constitution: docs/methodology/constitution/gendev.md
  workflow: docs/methodology/guides/agentic-development-workflow.md
  gates: docs/methodology/guides/gates.md
  collaboration_modes: docs/methodology/guides/collaboration-modes.md
  collaboration_loop: docs/methodology/guides/human-agent-collaboration-loop.md
  next_step_protocol: docs/methodology/guides/start-and-next-step-protocol.md
  gate_transition_protocol: docs/methodology/guides/gate-transition-protocol.md
  amendment_protocol: docs/methodology/guides/amendment-and-regression-protocol.md
  enforcement_contract: docs/methodology/guides/enforcement-contract.md
  approval_protocol: docs/methodology/guides/human-approval-protocol.md
  subagent_protocol: docs/methodology/guides/subagent-coordination-protocol.md
  artifact_protocol: docs/methodology/guides/artifact-collaboration-protocol.md
  production_protocol: docs/methodology/guides/production-operations-protocol.md
  orchestration_validation: docs/methodology/guides/orchestration-validation.md
  vision: docs/project/vision/vision.md
  prd: docs/project/prd/prd.md
  architecture: docs/project/architecture/architecture.md
  governance_security: docs/project/security-governance/governance-security-spec.md
  traceability: docs/project/traceability/traceability-matrix.md
  approval_log: docs/project/approvals/gate-log.md
  value_review: docs/project/as-built/phase-1-value-review.md

collaboration:
  mode: approval-gated
  lead_agent: TBD
  active_role: product-vision-agent
  subagents_enabled: true
  mode_set_by: TBD
  mode_set_on: TBD

scaling:
  blast_radius_class: C2
  classification_reason: Default C2 standard product path until human reclassifies.
  classification_owner: TBD
  class_set_on: TBD
  gate_combination_policy: default_full_chain
  combined_gates: []

approvals:
  record_format: structured_markdown_yaml
  current_gate:
    gate: G1
    status: pending
    required_approver: TBD
    approved_by: TBD
    approved_on: TBD
    evidence:
      - docs/project/vision/vision.md
    risks_accepted:
      - TBD
    blocking_open_questions:
      - TBD
    next_gate: G2
    next_role: prd-agent
    next_artifact: docs/project/prd/prd.md
  latest_decision:
    decision: TBD
    decided_by: TBD
    decided_on: TBD
    record: docs/project/approvals/gate-log.md

artifacts:
  provenance_required: true
  provenance_status: warning
  stale_blocks_gate_evidence: true
  required_provenance_fields:
    - Produced by
    - Produced on
    - Produced with
    - Agent identity
    - Derived from

amendments:
  active_count: 0
  record: docs/project/approvals/gate-log.md
  protocol: docs/methodology/guides/amendment-and-regression-protocol.md
  active: []

enforcement:
  contract_version: draft
  class: attested
  protected_branch: master
  implementation_paths:
    - TBD
  excluded_paths:
    - docs/
    - scripts/
  binding_paths:
    pre_commit_hook: scripts/install-hooks.sh
    ci_workflow: .github/workflows/methodology.yml
  attestation:
    cadence: every_gate_transition
    required_attester: TBD
  exceptions:
    - requirement: EC-5
      mode: attested
      reason: provenance headers not yet adopted
  override_policy:
    required_approvers: 1
    record_path: docs/project/approvals/gate-log.md

measurement:
  metrics_command: scripts/methodology-metrics.sh docs/project
  metrics_snapshot_cadence: phase_closeout
  value_review: docs/project/as-built/phase-1-value-review.md
  value_review_required_after: first_production_or_value_event

phase:
  loop_status: not_started
  current_phase_id: null
  current: 1
  status: planning
  build_plan: docs/project/build-plan/phases/phase-1-build-plan.md
  tactical_plan: docs/project/build-plan/phases/phase-1-tactical-implementation-plan.md
  construction_directive: docs/project/build-plan/phases/phase-1-construction-directive.md
  test_uat_plan: docs/project/testing/phase-1-test-uat-plan.md
  code_review: docs/project/build-plan/phases/phase-1-code-review.md
  as_built_closeout: docs/project/as-built/phase-1-as-built-closeout.md
  value_review: docs/project/as-built/phase-1-value-review.md
  # Phase-loop fields (populated at G5.0 when the phase plan is accepted).
  # phase_position is the interior checkpoint address, e.g. G5.1.2. It is
  # null until the phase loop begins. The phases list is the partition
  # declared by the phase plan; order in this list is authoritative and is
  # never computed from the id. status is one of: pending, in_progress, exited.
  phase_position: null
  phase_plan: docs/project/build-plan/phase-plan.md
  phases: []

notes:
  examples_are_non_authoritative: true
